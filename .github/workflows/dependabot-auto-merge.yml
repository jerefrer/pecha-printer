# Auto-merge trusted Dependabot PRs.
#
# When Dependabot opens a PR, this workflow fetches its metadata. If it's a
# patch update (or a security update of any kind), the workflow approves
# and enables GitHub's "auto-merge" — the PR will merge itself once the
# rest of the CI is green. Minor and major bumps are left alone for human
# review.
#
# Requires:
#   - Repo Settings → General → Pull Requests → "Allow auto-merge" checked
#   - Repo Settings → Code & automation → Actions → General →
#     Workflow permissions: "Read and write" + "Allow GitHub Actions to
#     create and approve pull requests"

name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Approve and enable auto-merge for patches and security updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.dependency-type == 'direct:production' && steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          contains(steps.meta.outputs.dependency-names, 'GHSA')
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
